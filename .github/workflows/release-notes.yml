name: Release Notes

on:
  schedule:
    # 9 AM PST (5 PM UTC) weekdays only
    - cron: '0 17 * * 1-5'
  workflow_dispatch:

jobs:
  post:
    name: Post to Slack
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for commit messages

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: release-notes/state.json
          key: release-notes-state-${{ github.run_id }}
          restore-keys: release-notes-state-

      - name: Post release notes
        run: bun run release-notes/post-to-slack.ts
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Save state cache
        uses: actions/cache/save@v4
        with:
          path: release-notes/state.json
          key: release-notes-state-${{ github.run_id }}
