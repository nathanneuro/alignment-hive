# GPU types to try, in order of preference.
gpu-type-ids = ["NVIDIA GeForce RTX 3090"]

# Number of GPUs.
# gpu-count = 1

# Container image.
# image-name = "runpod/pytorch:2.1.0-py3.10-cuda11.8.0-devel-ubuntu22.04"

# Disk sizes in GB.
# container-disk-gb = 50
# volume-gb = 20
# volume-mount-path = "/workspace"

# Attach a network volume (optional, get ID from RunPod dashboard).
# network-volume-id = "vol_abc123"

# What to do on cleanup: "stop" (preserve pod) or "terminate" (delete pod).
cleanup = "terminate"

# Cloud type: "SECURE" or "COMMUNITY".
cloud-type = "COMMUNITY"

# Pod name prefix.
# name = "remote-kernels"

# Per-session budget cap in dollars. Warnings when approaching limit.
# budget-cap = 5.0

# Extra environment variables for the pod.
# [env]
# MY_VAR = "value"
